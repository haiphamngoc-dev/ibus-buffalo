name: Release Build and Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libibus-1.0-dev libgtk-4-dev libx11-dev libxtst-dev build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build and Package .deb
        run: |
          # Pass the tag name (e.g. v0.1.0) as the version argument to the script
          ./package-deb.sh "${{ github.ref_name }}"

      - name: Create Release and Upload Asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ github.ref_name }}"
          # Strip leading 'v' from the tag name to match the package version name
          PKG_VERSION="${TAG_NAME#v}"
          DEB_FILE="target/debian/ibus-buffalo_${PKG_VERSION}_amd64.deb"
          
          echo "Creating GitHub Release for tag $TAG_NAME and uploading $DEB_FILE..."
          gh release create "$TAG_NAME" "$DEB_FILE" \
            --title "Release $TAG_NAME" \
            --notes "Automated release of IBus Buffalo version $TAG_NAME. Install using: sudo dpkg -i ibus-buffalo_${PKG_VERSION}_amd64.deb"
